# For syntax, see https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
# This workflow is automatically triggered for pull requests to verify that everything still builds.

name: Editor Plugin Tests
on:
  workflow_call:
  pull_request:
  merge_group:

env:
  
  # Used to select the version of Godot to run the tests with.
  GODOT_TEST_VERSION: 4.6.1-stable
  # Use UTF-8 on Linux.
  LANG: en_US.UTF-8
  LC_ALL: en_US.UTF-8
  # Use UTF-8 on Windows.
  PYTHONIOENCODING: utf8

defaults:
  run:
    working-directory: godot-editor-plugin/addons/rider-plugin/cpp

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Test a few selected combinations of parameters ("test case matrix").
        include:
          - target: { platform: linux, arch: x86_64, os: ubuntu-22.04, run-tests: true }
            target-type: editor
            float-precision: single
          - target: { platform: windows, arch: x86_64, os: windows-latest, run-tests: false }
            target-type: editor
            float-precision: single
          - target: { platform: macos, arch: universal, os: macos-latest, run-tests: false }
            target-type: editor
            float-precision: single

    runs-on: ${{ matrix.target.os }}
    steps:
      # Clone this repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # Setup dependencies
      - name: Setup godot-cpp
        uses: ./godot-editor-plugin/addons/rider-plugin/cpp/godot-cpp/.github/actions/setup-godot-cpp
        with:
          platform: ${{ matrix.target.platform }}
          em-version: 3.1.62

      # Build GDExtension (with caches)
      - name: Restore .scons_cache
        uses: ./godot-editor-plugin/addons/rider-plugin/cpp/godot-cpp/.github/actions/godot-cache-restore
        with:
          scons-cache: ${{ github.workspace }}/.scons-cache/
          cache-name: ${{ matrix.target.platform }}_${{ matrix.target.arch }}_${{ matrix.float-precision }}_${{ matrix.target-type }}

      - name: Build GDExtension Debug Build
        shell: sh
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache/
        run: |
          scons target=${{ matrix.target-type }} platform=${{ matrix.target.platform }} arch=${{ matrix.target.arch }} precision=${{ matrix.float-precision }}

      - name: Save .scons_cache
        uses: ./godot-editor-plugin/addons/rider-plugin/cpp/godot-cpp/.github/actions/godot-cache-save
        with:
          scons-cache: ${{ github.workspace }}/.scons-cache/
          cache-name: ${{ matrix.target.platform }}_${{ matrix.target.arch }}_${{ matrix.float-precision }}_${{ matrix.target-type }}

      - name: Download requested Godot version for testing
        if: matrix.target.run-tests
        run: |
          wget "https://github.com/godotengine/godot/releases/download/${GODOT_TEST_VERSION}/Godot_v${GODOT_TEST_VERSION}_linux.x86_64.zip" -O Godot.zip
          unzip -a Godot.zip
          chmod +x "Godot_v${GODOT_TEST_VERSION}_linux.x86_64"
          echo "GODOT=$(pwd)/Godot_v${GODOT_TEST_VERSION}_linux.x86_64" >> $GITHUB_ENV

      - name: Run tests
        if: matrix.target.run-tests
        run: |
          $GODOT --headless --version
          cd ../../../
          # Need to run the editor so .godot is generated... but it crashes! Ignore that :-)
          (timeout 30 $GODOT --import --headless >/dev/null 2>&1 || true)
          ./run-tests.sh

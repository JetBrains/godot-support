# For syntax, see https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
# This workflow is triggered manually on the "Actions" tab on GitHub, and can be used to create releases.

name: Editor Plugin Release
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to create for the GitHub Release (e.g., v1.2.3). Leave empty to auto-generate.'
        required: false
        type: string
      release_name:
        description: 'Release title. Defaults to tag name or an auto-generated name.'
        required: false
        type: string
      prerelease:
        description: 'Mark release as prerelease'
        required: false
        type: boolean
        default: true

jobs:
  build:
    defaults:
      run:
        working-directory: godot-editor-addon
    strategy:
      fail-fast: false
      matrix:
        target:
          [
            { platform: linux, arch: x86_64, os: ubuntu-22.04 },
            { platform: linux, arch: arm64, os: ubuntu-22.04-arm },
            { platform: windows, arch: x86_64, os: windows-latest },
            # { platform: windows, arch: arm64, os: windows-latest }, // mingv doesn't this
            { platform: macos, arch: universal, os: macos-latest },
          ]
        target-type: [editor]
        float-precision: [single]

    runs-on: ${{ matrix.target.os }}
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      # Clone this repository
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      # Setup dependencies
      - name: Setup godot-cpp
        uses: ./godot-editor-addon/native/rider-plugin/godot-cpp/.github/actions/setup-godot-cpp
        with:
          platform: ${{ matrix.target.platform }}
          buildtool: cmake

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      # Build GDExtension
      - name: Configure GDExtension
        run: >
          cmake --preset ninja-release
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build GDExtension
        run: cmake --build build/ninja-release --verbose

      # Upload the build
      - name: Stage Artifact
        shell: bash
        run: |
          mkdir -p artifact/addons
          cp -r addons/rider-plugin artifact/addons/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rider-plugin-addons-${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ matrix.float-precision }}-${{ matrix.target-type }}
          path: godot-editor-addon/artifact

  # Merges all the build artifacts together into a single artifact
  merge:
    runs-on: ubuntu-22.04
    needs: build
    defaults:
      run:
        working-directory: .
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: rider-plugin-addons
          pattern: rider-plugin-addons-*
          delete-merged: true

  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: merge
    permissions:
      contents: write
    steps:
      - name: Download merged artifact
        uses: actions/download-artifact@v4
        with:
          name: rider-plugin-addons
          path: rider-plugin-addons

      - name: Compute release params
        id: rel
        shell: bash
        run: |
          TAG_INPUT="${{ github.event.inputs.tag_name }}"
          NAME_INPUT="${{ github.event.inputs.release_name }}"
          if [ -z "$TAG_INPUT" ]; then
            TAG="manual-${GITHUB_RUN_NUMBER}"
          else
            TAG="$TAG_INPUT"
          fi
          if [ -z "$NAME_INPUT" ]; then
            NAME="$TAG"
          else
            NAME="$NAME_INPUT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Update plugin version
        run: |
          sed -i 's/^version=.*/version="${{ steps.rel.outputs.tag }}"/' rider-plugin-addons/addons/rider-plugin/plugin.cfg

      - name: Prepare archive
        run: |
          zip -r rider-plugin-addons.zip rider-plugin-addons

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.name }}
          files: rider-plugin-addons.zip
          draft: ${{ github.event.inputs.draft }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
